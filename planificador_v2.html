<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyDpwb59ZRy-2_28aWG1dZ17whlj-7-XHz0",
    authDomain: "planificador-d72c6.firebaseapp.com",
    projectId: "planificador-d72c6",
    storageBucket: "planificador-d72c6.firebasestorage.app",
    messagingSenderId: "965280238896",
    appId: "1:965280238896:web:a323ada30c390e93018cf5"
};

const firebaseApp = initializeApp(firebaseConfig);
const auth = getAuth(firebaseApp);
const db = getFirestore(firebaseApp);

// Exponer al scope global para que el script principal los use
window._fb = { auth, db, doc, setDoc, getDoc, onSnapshot, signInWithEmailAndPassword, signOut, onAuthStateChanged };

// Pantalla de login
function mostrarLogin(error='') {
    document.getElementById('appRoot').style.display = 'none';
    let loginEl = document.getElementById('loginScreen');
    if (!loginEl) {
        loginEl = document.createElement('div');
        loginEl.id = 'loginScreen';
        loginEl.style.cssText = 'position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg,#f5f5f5);z-index:9999;font-family:system-ui,sans-serif;';
        loginEl.innerHTML = `
            <div style="background:#fff;border-radius:12px;padding:40px 36px;box-shadow:0 4px 24px rgba(0,0,0,0.12);width:100%;max-width:360px;">
                <h2 style="margin:0 0 8px;font-size:1.3rem;color:#1a1a2e;">Planificador Académico</h2>
                <p style="margin:0 0 24px;font-size:0.85rem;color:#666;">Ingresa con tu cuenta</p>
                <div style="margin-bottom:14px;">
                    <label style="display:block;font-size:0.8rem;font-weight:600;margin-bottom:4px;color:#444;">Correo</label>
                    <input id="loginEmail" type="email" autocomplete="email" placeholder="correo@ejemplo.com"
                        style="width:100%;box-sizing:border-box;padding:10px 12px;border:1px solid #ddd;border-radius:8px;font-size:0.9rem;outline:none;">
                </div>
                <div style="margin-bottom:20px;">
                    <label style="display:block;font-size:0.8rem;font-weight:600;margin-bottom:4px;color:#444;">Contraseña</label>
                    <input id="loginPass" type="password" autocomplete="current-password" placeholder="••••••••"
                        style="width:100%;box-sizing:border-box;padding:10px 12px;border:1px solid #ddd;border-radius:8px;font-size:0.9rem;outline:none;">
                </div>
                <div id="loginError" style="color:#e53935;font-size:0.82rem;margin-bottom:12px;min-height:18px;">${error}</div>
                <button id="loginBtn"
                    style="width:100%;padding:11px;background:#1976d2;color:#fff;border:none;border-radius:8px;font-size:0.95rem;font-weight:600;cursor:pointer;">
                    Ingresar
                </button>
            </div>`;
        document.body.appendChild(loginEl);
    } else {
        loginEl.style.display = 'flex';
        document.getElementById('loginError').textContent = error;
        document.getElementById('loginEmail').value = '';
        document.getElementById('loginPass').value = '';
    }

    const doLogin = async () => {
        const email = document.getElementById('loginEmail').value.trim();
        const pass = document.getElementById('loginPass').value;
        const btn = document.getElementById('loginBtn');
        if (!email || !pass) { document.getElementById('loginError').textContent = 'Ingresa correo y contraseña'; return; }
        btn.textContent = 'Ingresando...'; btn.disabled = true;
        try {
            await signInWithEmailAndPassword(auth, email, pass);
        } catch(e) {
            btn.textContent = 'Ingresar'; btn.disabled = false;
            const msg = e.code === 'auth/invalid-credential' || e.code === 'auth/wrong-password' || e.code === 'auth/user-not-found'
                ? 'Correo o contraseña incorrectos'
                : 'Error al ingresar. Intenta nuevamente.';
            document.getElementById('loginError').textContent = msg;
        }
    };

    document.getElementById('loginBtn').onclick = doLogin;
    // Enter en cualquier campo del login
    ['loginEmail','loginPass'].forEach(id => {
        document.getElementById(id).addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
    });
    setTimeout(()=>document.getElementById('loginEmail').focus(), 100);
}

function ocultarLogin(user) {
    const loginEl = document.getElementById('loginScreen');
    if (loginEl) loginEl.style.display = 'none';
    document.getElementById('appRoot').style.display = '';
    // Mostrar usuario en la app
    window._usuarioActual = user.email;
    const headerUser = document.getElementById('headerUsuario');
    if (headerUser) { headerUser.textContent = user.email; headerUser.style.display = 'inline'; }
}

// Observador de sesión — controla qué se muestra
onAuthStateChanged(auth, async (user) => {
    if (user) {
        ocultarLogin(user);

    async function cargar() {
        // 1. Intentar cargar desde Firestore
        try {

                if (jsonRemoto === _lastSave) return;

                if (!remoto._version || remoto._version > (data._version || 0)) {
                    Object.assign(data, remoto);

        if (!data.temporadas || !data.temporadas.length) {
            const anio = new Date().getFullYear();
            const mes = new Date().getMonth();
            const tempDefault = mes >= 2 && mes < 5 ? 'Otoño' : mes >= 5 && mes < 8 ? 'Invierno' : mes >= 8 && mes < 11 ? 'Primavera' : 'Verano';
            data.temporadas = [{id:genId(), temporada:tempDefault, anio}];
        }
        data.sel.temporadaId = data.sel.temporadaId || data.configuracion.temporadaActualId || data.temporadas[0]?.id;
        data.configuracion.temporadaActualId = data.sel.temporadaId;
        const tempId = data.sel.temporadaId;
        if (!data.temporadaData || !Object.keys(data.temporadaData).length) {
            data.temporadaData[tempId] = { carreras:data.carreras, niveles:data.niveles, secciones:data.secciones, asignaturas:data.asignaturas, docentes:data.docentes, salas:data.salas, asignaturaCarreraNivel:data.asignaturaCarreraNivel, planificaciones:data.planificaciones };
        } else if (!data.temporadaData[tempId]) {
            data.temporadaData[tempId] = { carreras:data.carreras, niveles:data.niveles, secciones:data.secciones, asignaturas:data.asignaturas, docentes:data.docentes, salas:data.salas, asignaturaCarreraNivel:data.asignaturaCarreraNivel, planificaciones:data.planificaciones };

    function toast(msg,tipo='info'){

    function checkDisponibilidad(docId,dia,bloque,secId){
        const doc=data.docentes.find(d=>d.id===docId); if(!doc) return {ok:false};
        if(!doc.disponibilidad?.[dia]?.[bloque-1]) return {ok:false};

        if(secId && indicePlan[`${secId}_${dia}_${bloque}`]) return {ok:false};
        if(indicePlan[`${docId}_${dia}_${bloque}`]) return {ok:false};
        if((contadorDocenteDia[`${docId}_${dia}`]||0) >= data.configuracion.bloquesDiariosMax) return {ok:false};
        if(!doc.autorizadoExceder && (contadorDocente[docId]||0) >= data.configuracion.bloquesSemestralesMax) return {ok:false};
        if(dia>0){
            const diaAnt=dia-1;
            const planesAnt=data.planificaciones.filter(p=>p.docenteId===docId && p.dia===diaAnt);
            if(planesAnt.length){
                let maxFin=0;
            planesAnt.forEach(p=>{ const bf=getBloque(p.bloque); if(bf&&bf.hFin>maxFin) maxFin=bf.hFin; });
            if(maxFin && (24*60 - maxFin + getBloque(bloque).hIni) < data.configuracion.horasDescanso*60) return {ok:false};
            }
        }
        if(data.sel.tipo==='presencial' && data.sel.salaId && data.sel.salaId!==SALA_VIRTUAL_ID && data.sel.salaId!==SALA_TRO2_ID){
            if(ocupacionSala[`${data.sel.salaId}_${dia}_${bloque}`]) return {ok:false};
        }
        return {ok:true,sug:true};
    }

        if(!disp.ok) return toast('Bloque no disponible','error');

        const dist=Math.abs(celdas[0]?.dia-arrastre.inicioDia)+Math.abs(celdas[0]?.bloque-arrastre.inicioBloque);
        if(dist<=data.configuracion.sensibilidadArrastre && celdas.length===1){
            const cell=celdas[0].cell; const plan=data.sel.seccionId?indicePlan[`${data.sel.seccionId}_${cell.dataset.dia}_${cell.dataset.bloque}`]:null;

        if(arrastre.origenPlan){

            if(destino) {

        if(data.modoPlan){

            if(estado){
                celdas.forEach(c=>{ if(asignarBloque(c.dia,c.bloque)) cont++; });
                if(cont>0) toast(`${cont} bloque(s) asignado(s)`,'success');
            } else {

                    if(plan && plan.asignaturaId === data.sel.asignaturaId){ eliminarBloque(plan); cont++; }
                });

            }
            actualizarSelectoresPlan();
        }
        arrastre.origenPlan=null;
    });
    function asignarBloque(dia,bloque){
        const s=data.sel; if(!data.modoPlan||!s.seccionId||!s.asignaturaId||!s.docenteId) return false;
        const disp=checkDisponibilidad(s.docenteId,dia,bloque,s.seccionId); if(!disp.ok) return false;
        const asig=data.asignaturas.find(a=>a.id===s.asignaturaId);
        if(asig){
            const planesTipo=data.planificaciones.filter(p=>p.asignaturaId===asig.id && p.seccionId===s.seccionId && ((s.tipo==='presencial'&&p.tipoPresencial!==false)||(s.tipo==='virtual'&&p.tipoPresencial===false)));
            const maxPermitido=s.tipo==='presencial'?(asig.horasTotales-asig.horasVirtuales)/18:asig.horasVirtuales/18;
            if(planesTipo.length>=maxPermitido) return false;
        }
        pushUndo(); const plan={id:genId(),seccionId:s.seccionId,asignaturaId:s.asignaturaId,docenteId:s.docenteId,salaId:s.tipo==='virtual'?SALA_VIRTUAL_ID:s.salaId,dia,bloque,tipoPresencial:s.tipo==='presencial'};
        data.planificaciones.push(plan); guardar(); actualizarCelda(dia,bloque); return true;
    }
    function eliminarBloque(plan){ pushUndo(); data.planificaciones=data.planificaciones.filter(p=>p.id!==plan.id); guardar(); actualizarCelda(plan.dia,plan.bloque); }

    function cambiarDocenteAsignatura(plan){
        const docentesDisponibles=data.docentes.filter(d=>d.asignaturasQueDicta?.includes(plan.asignaturaId));
        const lista=docentesDisponibles.map(d=>`<option value="${d.id}">${d.nombre} ${d.apellido}</option>`).join('');

            const planesCambiar = data.planificaciones.filter(p=>p.asignaturaId===plan.asignaturaId && p.seccionId===plan.seccionId);
            let errorBloque = null;
            for (const p of planesCambiar) {
                const disp = checkDisponibilidadDocente(nuevoDocenteId, p.dia, p.bloque);
                if (!disp.ok) { errorBloque = disp.msg; break; }
            }
            if (errorBloque) { toast(`Error: ${errorBloque}`, 'error'); return; }
            pushUndo(); planesCambiar.forEach(p=>p.docenteId=nuevoDocenteId);

        };

    function checkDisponibilidadDocente(docId, dia, bloque) {
        const doc = data.docentes.find(d=>d.id===docId);
        if (!doc) return {ok:false, msg:'Docente no encontrado'};
        if (!doc.disponibilidad?.[dia]?.[bloque-1]) return {ok:false, msg:`Docente no disponible en ${DIAS[dia]} B${bloque}`};
        if (data.planificaciones.some(p=>p.docenteId===docId && p.dia===dia && p.bloque===bloque)) return {ok:false, msg:`Docente ya tiene clase en ${DIAS[dia]} B${bloque}`};
        const bloquesDiarios = data.planificaciones.filter(p=>p.docenteId===docId && p.dia===dia).length;
        if (bloquesDiarios >= data.configuracion.bloquesDiariosMax) return {ok:false, msg:'Límite diario excedido'};
        const totalBloques = data.planificaciones.filter(p=>p.docenteId===docId).length;
        if (!doc.autorizadoExceder && totalBloques >= data.configuracion.bloquesSemestralesMax) return {ok:false, msg:'Límite semestral excedido'};
        if (dia > 0) {
            const diaAnt = dia-1;
            const planesAnt = data.planificaciones.filter(p=>p.docenteId===docId && p.dia===diaAnt);
            if (planesAnt.length) {
                let maxFin = 0;
                planesAnt.forEach(p=>{ const bf=getBloque(p.bloque); if(bf&&bf.hFin>maxFin) maxFin=bf.hFin; });
                if (maxFin && (24*60 - maxFin + getBloque(bloque).hIni) < data.configuracion.horasDescanso*60) return {ok:false, msg:'No respeta descanso de 12 horas'};
            }
        }
        return {ok:true};
    }

    function cambiarSalaAsignatura(plan){
        const planesAsig = data.planificaciones.filter(p=>p.asignaturaId===plan.asignaturaId && p.seccionId===plan.seccionId && p.tipoPresencial!==false);
        const salasUnicas = [...new Set(planesAsig.map(p=>p.salaId))];
        let html = '<div class="modal-overlay" id="modalOverlay"><div class="modal"><h3>Cambiar salas presenciales</h3>';
        if(salasUnicas.length===0) html+='<p>No hay bloques presenciales para esta asignatura.</p>';
        else {
            html+='<table width="100%"><tr><th>Sala actual</th><th>Nueva sala</th></tr>';
            salasUnicas.forEach(salaId=>{
                const salaActual = data.salas.find(s=>s.id===salaId);
                const salasDisponibles = data.salas.filter(s=>!s.esVirtual);
                html+=`<tr><td>${salaActual?.nombre||salaId}</td><td><select class="form-select nuevoSala" data-sala="${salaId}"><option value="">No cambiar</option>${salasDisponibles.map(s=>`<option value="${s.id}">${s.nombre}</option>`).join('')}</select></td></tr>`;
            });
            html+='</table>';
        }
        html+='<button class="btn btn-primary" id="btnAplicarCambioSala">Aplicar cambios</button></div></div>';
        document.getElementById('modalContainer').innerHTML = html;
        document.getElementById('btnAplicarCambioSala')?.addEventListener('click',()=>{
            const cambios = {};
            document.querySelectorAll('.nuevoSala').forEach(sel=>{
                if(sel.value) cambios[sel.dataset.sala] = sel.value;
            });
            if(Object.keys(cambios).length===0) return toast('No se seleccionó ningún cambio','error');
            for (const p of planesAsig) {
                const nuevaSala = cambios[p.salaId] || p.salaId;
                if (nuevaSala !== p.salaId) {
                    if (nuevaSala !== SALA_VIRTUAL_ID && nuevaSala !== SALA_TRO2_ID && ocupacionSala[`${nuevaSala}_${p.dia}_${p.bloque}`]) {
                        return toast(`Error: la sala ${data.salas.find(s=>s.id===nuevaSala)?.nombre} está ocupada en ${DIAS[p.dia]} B${p.bloque}`, 'error');
                    }
                }
            }
            pushUndo(); planesAsig.forEach(p=>{ if(cambios[p.salaId]) p.salaId = cambios[p.salaId]; });
            guardar(); construirGrilla(); actualizarSelectoresPlan(); cerrarModal(); toast('Salas actualizadas','success');
        });
        document.getElementById('modalOverlay')?.addEventListener('click',(e)=>{if(e.target===e.currentTarget)cerrarModal();});
    }

        asig.innerHTML='<option value="">-- Asignatura --</option>'+(data.sel.carreraId&&data.sel.nivelId?data.asignaturaCarreraNivel.filter(r=>r.carreraId===data.sel.carreraId&&r.nivelId===data.sel.nivelId).map(r=>{

            const partes=[]; if(a.horasPresenciales>0) partes.push(a.horasPresenciales+'hP'); if(a.horasVirtuales>0) partes.push(a.horasVirtuales+'hV');
            return `<option value="${a.id}">${a.codigo} - ${a.nombre} (${partes.join(' + ')})</option>`;

                const usados=contadorDocente[d.id]||0;
                const matchEsp=carreraEsp&&d.especialidad===carreraEsp;
                return `<option value="${d.id}" ${(!d.autorizadoExceder&&usados>=data.configuracion.bloquesSemestralesMax)?'disabled':''}>${d.nombre} ${d.apellido}${d.especialidad?` [${d.especialidad}]`:''} (${usados}/${data.configuracion.bloquesSemestralesMax} · ${usados*18}h)${matchEsp?' ★':''}</option>`;
            }).join('');
        })():''); doc.value=data.sel.docenteId||''; doc.disabled=!data.sel.asignaturaId;
        sala.innerHTML='<option value="">-- Sala --</option>'+data.salas.map(s=>`<option value="${s.id}">${s.nombre}</option>`).join(''); sala.value=data.sel.salaId||''; sala.disabled=!data.sel.docenteId;

    function puntuarSlot(dia, bloque, asigId, secId, docId, esPresencial) {
        let score = 0;
        const sec = data.secciones.find(s => s.id === secId);
        const parsed = sec ? parsearCodigoSeccion(sec.nombre) : null;
        const esVespertino = parsed && parsed.tipo === 'V';
        const esPrimerSemestre = parsed && parsed.nivel === 'N1';
        const planesExistentes = data.planificaciones.filter(p=>p.asignaturaId===asigId && p.seccionId===secId);
        const planesHoy = planesExistentes.filter(p => p.dia === dia);
        const tieneAdyacente = planesHoy.some(p => Math.abs(p.bloque-bloque)===1);
        const tieneBloque6 = planesHoy.some(p => p.bloque === 6);
        const tieneBloque7 = planesHoy.some(p => p.bloque === 7);
        if(tieneAdyacente) score += 25;
        if(planesHoy.length > 0) score += 5;
        if(tieneBloque6 && bloque === 7) score -= 40;
        if(tieneBloque7 && bloque === 6) score -= 40;
        if(bloque >= 5) score += 20;
        if(esPresencial){
            if(esVespertino){
                if(bloque >= 13) score += 30;
                else score -= 30;
            } else {
                if(bloque >= 5 && bloque <= 12) score += 15;
                else if(bloque < 5) score += (esPrimerSemestre ? 20 : 5);
                else score -= 10;
            }
        } else {
            if(dia === 5 && bloque >= 9) score += 35;
            else if(dia === 5) score += 10;
            else if(bloque >= 9) score += 10;
        }
        if(dia < 5) score += Math.max(0, 10 - dia * 2);
        const bloquesDocenteEnDia = data.planificaciones.filter(p=>p.docenteId===docId && p.dia===dia).length;
        if(bloquesDocenteEnDia >= 4) score -= 5;
        return score;
    }
    function autoAsignarBloques(asigId, secId, docId, salaId, esPresencial, offsetDia) {
        const asig=data.asignaturas.find(a=>a.id===asigId); if(!asig) return 0;
        const sec=data.secciones.find(se=>se.id===secId);
        const parsed=sec?parsearCodigoSeccion(sec.nombre):null;
        const esVespertino=parsed&&parsed.tipo==='V';
        const req=esPresencial?asig.bloquesPresenciales:asig.bloquesVirtuales;
        const ya=esPresencial?getPlanificaciones().filter(p=>p.asignaturaId===asigId&&p.seccionId===secId&&p.tipoPresencial!==false).length:getPlanificaciones().filter(p=>p.asignaturaId===asigId&&p.seccionId===secId&&p.tipoPresencial===false).length;
        const pendientes=req-ya; if(pendientes<=0) return 0;
        const salasPref=asig.salasPreferidas||[];
        const salaReal = !esPresencial ? SALA_VIRTUAL_ID : (salaId||(salasPref.length?null:SALA_TRO2_ID));
        const asignados=[];
        function salaOk(sala,dia,bloque){
            return sala===SALA_VIRTUAL_ID||sala===SALA_TRO2_ID||!getPlanificaciones().some(p=>p.salaId===sala&&p.dia===dia&&p.bloque===bloque);
        }
        function mejorRangoPorDia(dia){
            const disponibles=[];
            for(let b=1;b<=18;b++){
                if(esVespertino&&b<13) continue;
                if(getPlanificaciones().some(p=>p.seccionId===secId&&p.dia===dia&&p.bloque===b)||getPlanificaciones().some(p=>p.asignaturaId===asigId&&p.seccionId===secId&&p.dia===dia&&p.bloque===b)) continue;
                const disp=checkDisponibilidad(docId,dia,b,secId);
                if(!disp.ok) continue;
                let salaElegida=salaReal;
                if(esPresencial&&!salaElegida&&salasPref.length){
                    salaElegida=salasPref.find(s=>salaOk(s,dia,b))||null;
                }
                if(esPresencial&&salaElegida&&salaElegida!==SALA_VIRTUAL_ID&&salaElegida!==SALA_TRO2_ID&&!salaOk(salaElegida,dia,b)) continue;
                disponibles.push({bloque:b,sala:salaElegida||salaReal||SALA_TRO2_ID});
            }
            if(disponibles.length<Math.min(pendientes,2)) return null;
            let mejorRango=null, mejorScore=-9999;
            for(let inicio=1;inicio<=18;inicio++) for(let fin=inicio;fin<=18&&fin-inicio+1<=pendientes;fin++){
                const rango=[]; let valido=true;
                for(let b=inicio;b<=fin;b++){
                    if(esVespertino&&b<13){valido=false;break;}
                    if(!disponibles.some(d=>d.bloque===b)){valido=false;break;}
                    rango.push(disponibles.find(d=>d.bloque===b));
                }
                if(!valido||rango.length<Math.min(pendientes,2)) continue;
                let adj=0, suelto=0, b7=0;
                rango.forEach(item=>{
                    const b=item.bloque||item;
                    if(rango.some(i=>(i.bloque||i)===b-1)||rango.some(i=>(i.bloque||i)===b+1)) adj+=20;
                    else suelto+=15;
                    if(b===7) b7+=10;
                });
                const score=adj-suelto-b7+(pendientes-rango.length)*5+(dia<5?10-dia*2:0);
                if(score>mejorScore){mejorScore=score;mejorRango=rango;}
            }
            if(!mejorRango||mejorRango.length<Math.min(pendientes,2)) return null;
            return mejorRango;
        }
        const diasBase=[0,1,2,3,4];
        const diasOrden=[...diasBase.slice(offsetDia||0),...diasBase.slice(0,offsetDia||0),5];
        let rest=pendientes;
        for(const dia of diasOrden){
            if(rest<=0) break;
            if(!esPresencial||dia!==5){
                const rango=mejorRangoPorDia(dia);
                if(rango){
                    const tomar=rango.slice(0,Math.min(rest,rango.length));
                    tomar.forEach(item=>asignados.push({dia,bloque:item.bloque||item,sala:item.sala||salaReal||SALA_TRO2_ID}));
                    rest-=tomar.length;
                }
            }
        }
        if(!asignados.length) return 0;
        pushUndo();
        asignados.forEach(({dia,bloque,sala})=>{
            getPlanificaciones().push({id:genId(),seccionId:secId,asignaturaId:asigId,docenteId:docId,salaId:sala||SALA_TRO2_ID,dia,bloque,tipoPresencial:esPresencial});
        });
        reconstruirIndices();
        return asignados.length;
    }

            DIAS.forEach((d,di)=>{
                const cell=document.createElement('div'); cell.className='grid-cell';

                data.asignaturas.find(a=>a.id===p.asignaturaId)?.nombre||'',
                data.secciones.find(s=>s.id===p.seccionId)?.nombre||'', DIAS[p.dia], p.bloque
            ]);
            columnas = ['Código','Asignatura','Sección','Día','Bloque'];
        } else if (tipo === 'incompletas') {
            const asignaturas = data.asignaturas.filter(a=>{
                const planes = data.planificaciones.filter(p=>p.asignaturaId===a.id);
                return planes.filter(p=>p.tipoPresencial!==false).length<a.bloquesPresenciales || planes.filter(p=>p.tipoPresencial===false).length<a.bloquesVirtuales;
            });
            datos = asignaturas.map(a=>[a.codigo, a.nombre, a.bloquesPresenciales, a.bloquesVirtuales,
                data.planificaciones.filter(p=>p.asignaturaId===a.id&&p.tipoPresencial!==false).length,
                data.planificaciones.filter(p=>p.asignaturaId===a.id&&p.tipoPresencial===false).length]);
            columnas = ['Código','Nombre','Req P','Req V','Plan P','Plan V'];
        } else if (tipo === 'cargaDocente') {
            datos = data.docentes.map(d=>[d.nombre, d.apellido, contadorDocente[d.id]||0, (contadorDocente[d.id]||0)*18, d.autorizadoExceder?'Sí':'No']);
            columnas = ['Nombre','Apellido','Bloques','Horas','Autorizado'];
        } else if (tipo === 'excedidos') {
            datos = data.docentes.filter(d=>d.autorizadoExceder&&(contadorDocente[d.id]||0)>data.configuracion.bloquesSemestralesMax).map(d=>[d.nombre, d.apellido, contadorDocente[d.id]||0, (contadorDocente[d.id]||0)*18]);
            columnas = ['Nombre','Apellido','Bloques','Horas'];
        } else if (tipo === 'comparativaHomologo') {
            datos = data.docentes.filter(d=>d.horasHomologo!==undefined).map(d=>{
                const actual = (contadorDocente[d.id]||0)*18, diff = actual-(d.horasHomologo||0), porcentaje = d.horasHomologo ? (diff/d.horasHomologo*100).toFixed(1) : 'N/A';
                return [d.nombre, d.apellido, d.tipoContrato||'', d.horasHomologo||0, actual, diff, porcentaje];
            });
            columnas = ['Nombre','Apellido','Contrato','Homólogo','Actual','Diferencia','% Variación'];
        }
        return { datos, columnas };
    }
    function actualizarReporte(){
        const tipo=document.getElementById('reporteTipo')?.value; if(!tipo) return;
        const container=document.getElementById('reporteContenido');
        const { datos, columnas } = obtenerDatosReporte(tipo);
        container.innerHTML = datos.length ? generarTablaReporte(datos, columnas) : '<p>No hay datos para este reporte.</p>';

    function generarTablaReporte(datos,columnas){
        if(!datos.length) return '<p>No hay datos.</p>';
        let html='<table class="report-table"><thead><tr>'+columnas.map(c=>`<th>${c}</th>`).join('')+'</tr></thead><tbody>';
        datos.forEach(row=>{ html+='<tr>'+row.map(cell=>`<td>${cell}</td>`).join('')+'</tr>'; });
        html+='</tbody></table>'; return html;
    }

        else if(tipo==='nivel'){ data.secciones.filter(s=>s.nivelId===id).forEach(s=>eliminarEntidad('seccion',s.id)); data.niveles=data.niveles.filter(n=>n.id!==id); }
        else if(tipo==='seccion'){ pushUndo(); data.planificaciones=data.planificaciones.filter(p=>p.seccionId!==id); data.secciones=data.secciones.filter(s=>s.id!==id); }

    function guardarCarrera(id){
        const cod=document.getElementById('codCarr').value.trim(), nom=document.getElementById('nomCarr').value.trim(), esp=document.getElementById('especialidadCarrera').value, tipo=document.getElementById('tipoCarrera').value;
        if(!cod) return toast('El código de carrera es obligatorio','error');
        if(!nom) return toast('El nombre de carrera es obligatorio','error');
        // Verificar código duplicado (en otra carrera distinta)
        const duplicado = data.carreras.find(c=>c.codigo.toLowerCase()===cod.toLowerCase() && c.id!==id);
        if(duplicado) return toast(`Ya existe una carrera con el código "${cod}"`, 'error');
        if(id){const c=data.carreras.find(c=>c.id===id);c.codigo=cod;c.nombre=nom;c.especialidad=esp;c.tipo=tipo;} else data.carreras.push({id:genId(),codigo:cod,nombre:nom,especialidad:esp,tipo:tipo});
        guardar(); cerrarModal(); refrescarTodo(); toast('Carrera guardada','success');
    }

    function renderMiniGrid(){
        const grid=document.getElementById('miniGrid'); if(!grid) return;
        grid.innerHTML=''; const header=document.createElement('div'); header.className='mini-cell'; header.textContent='Bloque'; grid.appendChild(header);
        DIAS.forEach(d=>{const h=document.createElement('div'); h.className='mini-cell'; h.textContent=d; grid.appendChild(h);});
        BLOQUES.forEach((b,bi)=>{
            const time=document.createElement('div'); time.className='mini-cell'; time.textContent=`B${b.n}`; grid.appendChild(time);
            DIAS.forEach((d,di)=>{
                const cell=document.createElement('div'); cell.className='mini-cell'; cell.dataset.dia=di; cell.dataset.bloque=bi;
                if(App._docenteTemp.disponibilidad[di][bi]) cell.classList.add('disponible');
                grid.appendChild(cell);
            });
        });
        let isDown=false, startEstado=false;
        grid.addEventListener('mousedown',(e)=>{
            const cell=e.target.closest('.mini-cell'); if(!cell||cell.cellIndex===0) return; e.preventDefault();
            isDown=true; const dia=parseInt(cell.dataset.dia),bloque=parseInt(cell.dataset.bloque);
            startEstado=!App._docenteTemp.disponibilidad[dia][bloque];
            App._docenteTemp.disponibilidad[dia][bloque]=startEstado; cell.classList.toggle('disponible',startEstado);
        });
        grid.addEventListener('mousemove',(e)=>{
            if(!isDown) return;
            const cell=e.target.closest('.mini-cell'); if(!cell||cell.cellIndex===0) return;
            const dia=parseInt(cell.dataset.dia),bloque=parseInt(cell.dataset.bloque);
            App._docenteTemp.disponibilidad[dia][bloque]=startEstado; cell.classList.toggle('disponible',startEstado);
        });
        grid.addEventListener('mouseup',()=>{isDown=false;});
        grid.addEventListener('mouseleave',()=>{isDown=false;});
        grid.addEventListener('click',(e)=>{
            if(e.shiftKey && App._lastMiniCell){
                const cell=e.target.closest('.mini-cell'); if(!cell||cell.cellIndex===0) return;
                const col1=parseInt(cell.dataset.dia),row1=parseInt(cell.dataset.bloque);
                const col2=App._lastMiniCell.col,row2=App._lastMiniCell.row;
                const minCol=Math.min(col1,col2),maxCol=Math.max(col1,col2),minRow=Math.min(row1,row2),maxRow=Math.max(row1,row2);
                const estado=!App._docenteTemp.disponibilidad[col1][row1];
                for(let c=minCol;c<=maxCol;c++) for(let r=minRow;r<=maxRow;r++) App._docenteTemp.disponibilidad[c][r]=estado;
                renderMiniGrid();
            }
            const cell=e.target.closest('.mini-cell');
            if(cell&&cell.cellIndex>0) App._lastMiniCell={col:parseInt(cell.dataset.dia),row:parseInt(cell.dataset.bloque)};
        });
    }

    function validarDatosImportados(d) {
        if (!d || typeof d !== 'object') return false;
        // Verificar que las colecciones principales existen y son arrays
        const arraysClave = ['carreras','niveles','secciones','asignaturas','docentes','salas','asignaturaCarreraNivel','planificaciones'];
        for (const campo of arraysClave) {
            if (!Array.isArray(d[campo])) return false;
        }
        // Verificar que configuracion es un objeto (no null ni array)
        if (!d.configuracion || typeof d.configuracion !== 'object' || Array.isArray(d.configuracion)) return false;
        return true;
    }
    function importarDatos(){
        const input=document.createElement('input'); input.type='file'; input.accept='.json';
        input.onchange=e=>{
            const file=e.target.files[0]; if(!file) return;
            const reader=new FileReader();
            reader.onload=ev=>{
                try {
                    const imported = JSON.parse(ev.target.result);
                    if (!validarDatosImportados(imported)) { toast('Archivo JSON inválido o incompleto','error'); return; }
                    Object.assign(data, imported);
                    normalizarDatos(); guardar(); refrescarTodo();
                } catch(err) {
                    toast('Error al importar: '+err.message,'error');
                }
            };
            reader.readAsText(file);
        };
        input.click();
    }

    // ─── Navegación por teclado ────────────────────────────────────────────────
    // Helpers para mover foco dentro de listas y popups
    function kbNavList(items, currentIndex, direction) {
        if (!items.length) return -1;
        let next = currentIndex + direction;
        if (next < 0) next = items.length - 1;
        if (next >= items.length) next = 0;
        return next;
    }
    function kbSetFocus(items, idx) {
        items.forEach(el => el.classList.remove('kb-focus'));
        if (idx >= 0 && idx < items.length) {
            items[idx].classList.add('kb-focus');
            items[idx].scrollIntoView({ block:'nearest' });
        }
    }
    // Obtiene el índice actualmente enfocado en una colección de elementos
    function kbCurrentIndex(items) {
        return Array.from(items).findIndex(el => el.classList.contains('kb-focus'));
    }

    // Navegación dentro de un popup de acción abierto
    function kbPopupNav(direction) {
        if (!App._popupAbierto) return false;
        const btns = Array.from(App._popupAbierto.querySelectorAll('button'));
        const idx = kbNavList(btns, kbCurrentIndex(btns), direction);
        kbSetFocus(btns, idx);
        return true;
    }
    function kbPopupEnter() {
        if (!App._popupAbierto) return false;
        const focused = App._popupAbierto.querySelector('button.kb-focus');
        if (focused) { focused.click(); return true; }
        // Si no hay ninguno enfocado aún, activar el primero
        const first = App._popupAbierto.querySelector('button');
        if (first) { first.click(); return true; }
        return false;
    }

    // Navegación dentro de una lista .search-results visible
    function kbSearchNav(listEl, direction) {
        if (!listEl || !listEl.classList.contains('show')) return false;
        const items = Array.from(listEl.querySelectorAll('li'));
        const idx = kbNavList(items, kbCurrentIndex(items), direction);
        kbSetFocus(items, idx);
        return true;
    }
    function kbSearchEnter(inputEl, listEl) {
        if (!listEl || !listEl.classList.contains('show')) return false;
        const focused = listEl.querySelector('li.kb-focus');
        if (focused) { focused.click(); inputEl?.blur(); return true; }
        // Sin foco explícito: activar el primero visible
        const first = listEl.querySelector('li');
        if (first) { first.click(); inputEl?.blur(); return true; }
        return false;
    }

    // Detecta qué search-results está activo según el input con foco
    function getActiveSearchPair() {
        const active = document.activeElement;
        if (!active) return null;
        const box = active.closest('.search-box');
        if (!box) return null;
        const list = box.querySelector('.search-results');
        return list ? { input: active, list } : null;
    }

    // Detecta si hay un modal abierto y encuentra su botón principal (Guardar/Aceptar/Confirmar)
    function getModalPrimaryBtn() {
        const overlay = document.getElementById('modalOverlay');
        if (!overlay) return null;
        // Buscar por clase primaria primero, luego por ID conocidos
        return overlay.querySelector('.btn-primary') ||
               overlay.querySelector('button[id*="Guardar"]') ||
               overlay.querySelector('button[id*="guardar"]') ||
               overlay.querySelector('button[id*="Aplicar"]') ||
               overlay.querySelector('button[id*="Cambiar"]') ||
               overlay.querySelector('button[id*="Aceptar"]') ||
               overlay.querySelector('button[id*="Confirmar"]');
    }

    document.addEventListener('keydown',(e)=>{
        // ── Undo / Redo ──────────────────────────────────────────────────────
        if((e.ctrlKey||e.metaKey) && e.key==='z' && !e.shiftKey){ e.preventDefault(); deshacer(); return; }
        if((e.ctrlKey||e.metaKey) && (e.key==='z' && e.shiftKey || e.key==='y')){ e.preventDefault(); rehacer(); return; }

        const inTextArea = e.target.tagName === 'TEXTAREA';
        const inInput = e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT';
        const searchPair = getActiveSearchPair();

        // ── Escape: cerrar capas de afuera hacia adentro ─────────────────────
        if (e.key === 'Escape') {
            // 1. Popup de acción de celda
            if (App._popupAbierto) { cerrarPopupAccion(); e.preventDefault(); return; }
            // 2. Listas de búsqueda abiertas
            const openList = document.querySelector('.search-results.show');
            if (openList) { openList.classList.remove('show'); openList.querySelectorAll('li').forEach(li=>li.classList.remove('kb-focus')); e.preventDefault(); return; }
            // 3. Dropdowns de menú abiertos
            const openDropdown = document.querySelector('.dropdown-menu.show');
            if (openDropdown) { openDropdown.classList.remove('show'); e.preventDefault(); return; }
            // 4. Modal abierto
            if (document.getElementById('modalOverlay')) { cerrarModal(); e.preventDefault(); return; }
            // 5. Modo planificación activo
            if (data.modoPlan) { document.getElementById('btnCancelarModo').click(); e.preventDefault(); return; }
            return;
        }

        // ── Flechas: navegación en popup y listas de búsqueda ────────────────
        if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
            const dir = e.key === 'ArrowDown' ? 1 : -1;
            // Popup de acción
            if (App._popupAbierto) { e.preventDefault(); kbPopupNav(dir); return; }
            // Lista de búsqueda activa
            if (searchPair) { e.preventDefault(); kbSearchNav(searchPair.list, dir); return; }
        }

        // ── Enter: confirmar selección o acción principal ────────────────────
        if (e.key === 'Enter' && !inTextArea) {
            // 1. Popup de acción abierto
            if (App._popupAbierto) { e.preventDefault(); kbPopupEnter(); return; }
            // 2. Lista de búsqueda activa con foco (tiene prioridad sobre el modal)
            if (searchPair && searchPair.list.classList.contains('show')) {
                e.preventDefault(); kbSearchEnter(searchPair.input, searchPair.list); return;
            }
            // 3. Modal abierto: Enter confirma siempre, incluso desde un input de texto
            //    Excepción: si el foco está en un <select> con lista desplegable nativa, no interferir
            const modalBtn = getModalPrimaryBtn();
            if (modalBtn && e.target.tagName !== 'SELECT') {
                e.preventDefault(); modalBtn.click(); return;
            }
        }
    });

            const vir=p.filter(x=>x.tipoPresencial===false).length;

    function detectarConflictos(){
        const cont=document.getElementById('dashboardConflictos'); if(!cont) return;
        if(data.configuracion.dashboard&&data.configuracion.dashboard.conflictos===false){ cont.style.display='none'; return; }
        cont.style.display='block';
        const p=getPlanificaciones(); const conflictos=[];
        p.forEach(plan=>{
            const mismo=p.filter(x=>x.docenteId===plan.docenteId&&x.dia===plan.dia&&x.bloque===plan.bloque&&x.id!==plan.id);
            if(mismo.length) conflictos.push({tipo:'docente',detalle:`${data.docentes.find(d=>d.id===plan.docenteId)?.nombre||'?'} en dos secciones ${DIAS[plan.dia]} B${plan.bloque}`});
            if(plan.salaId!==SALA_VIRTUAL_ID&&plan.salaId!==SALA_TRO2_ID){
                const mismaSala=p.filter(x=>x.salaId===plan.salaId&&x.dia===plan.dia&&x.bloque===plan.bloque&&x.id!==plan.id);
                if(mismaSala.length) conflictos.push({tipo:'sala',detalle:`${data.salas.find(s=>s.id===plan.salaId)?.nombre||'?'} duplicada ${DIAS[plan.dia]} B${plan.bloque}`});
            }
        });
        const unicos=[]; conflictos.forEach(c=>{if(!unicos.some(u=>u.detalle===c.detalle)) unicos.push(c);});
        if(!unicos.length){ cont.innerHTML='<p style="color:var(--success);font-size:0.85rem;">✅ Sin conflictos.</p>'; return; }
        cont.innerHTML=unicos.map(c=>`<div style="padding:6px 10px;margin-bottom:3px;background:#fff0f0;border-radius:4px;font-size:0.8rem;">⚠️ ${c.detalle}</div>`).join('');
    }
    function actualizarSelectorTemporada() {
        const sel=document.getElementById('selectorTemporada'); if(!sel) return;
        sel.innerHTML=data.temporadas.map(t=>`<option value="${t.id}" ${t.id===data.sel.temporadaId?'selected':''}>${t.temporada} ${t.anio}</option>`).join('');
        sel.onchange=()=>{ switchTemporada(sel.value); aplicarPaleta(); actualizarIndicadorPaleta(); guardar(); reconstruirIndices(); refrescarTodo(); };
    }
    function actualizarIndicadorPaleta() {
        const el=document.getElementById('indicadorPaleta'); if(!el) return;
        const id=data.sel.temporadaId||data.configuracion.temporadaActualId||data.temporadas[0]?.id;
        const t=data.temporadas.find(tmp=>tmp.id===id);
        const iconos={Otoño:'🍂',Invierno:'❄️',Primavera:'🌿',Verano:'☀️'};
        el.textContent=t?`${iconos[t.temporada]||''} ${t.temporada} ${t.anio}`:'';
    }
    document.getElementById('btnGestionarTemps').onclick=()=>{
        let html='<div class="modal-overlay" id="modalOverlay"><div class="modal"><h3>📅 Gestionar Temporadas</h3><table style="width:100%;border-collapse:collapse;"><tr><th style="text-align:left;padding:6px;">Temporada</th><th style="text-align:left;padding:6px;">Año</th><th></th></tr>';
        data.temporadas.forEach((t,i)=>html+=`<tr><td style="padding:4px;"><select class="form-select" data-idx="${i}" id="tempSel_${i}">${TEMPORADAS.map(tt=>`<option value="${tt}" ${tt===t.temporada?'selected':''}>${tt}</option>`).join('')}</select></td><td style="padding:4px;"><input class="form-input" type="number" id="tempAnio_${i}" value="${t.anio}" style="width:80px;"></td><td style="padding:4px;"><button class="btn btn-xs btn-eliminar-temp" data-idx="${i}">🗑️</button></td></tr>`);
        html+=`</table><button class="btn btn-sm" id="btnAgregarTemp">+ Agregar temporada</button><button class="btn btn-primary btn-sm" id="btnGuardarTemps" style="margin-left:8px;">Guardar</button></div></div>`;
        document.getElementById('modalContainer').innerHTML=html;
        document.getElementById('btnAgregarTemp').onclick=()=>{
            const temp=prompt('Temporada (Otoño/Invierno/Primavera/Verano):','Otoño'); if(!temp||!TEMPORADAS.includes(temp)) return toast('Temporada inválida','error');
            const anio=parseInt(prompt('Año:',String(new Date().getFullYear()))); if(!anio) return;
            const id=genId(); const nuevaTemp={id, temporada:temp, anio};
            const homologo = data.temporadas.find(t => t.temporada === temp && t.anio === anio - 1);
            let origen = homologo && data.temporadaData[homologo.id] ? homologo : null;
            if (!origen) origen = data.temporadas.find(t => t.id === data.sel.temporadaId);
            let copiar = false;
            if (origen && data.temporadaData[origen.id]) copiar = confirm('¿Copiar datos desde ' + origen.temporada + ' ' + origen.anio + '?');
            if (copiar) {
                const src = data.temporadaData[origen.id];
                data.temporadaData[id] = { carreras:JSON.parse(JSON.stringify(src.carreras)), niveles:JSON.parse(JSON.stringify(src.niveles)), secciones:JSON.parse(JSON.stringify(src.secciones)), asignaturas:JSON.parse(JSON.stringify(src.asignaturas)), docentes:JSON.parse(JSON.stringify(src.docentes)), salas:JSON.parse(JSON.stringify(src.salas)), asignaturaCarreraNivel:JSON.parse(JSON.stringify(src.asignaturaCarreraNivel)), planificaciones:[] };
                toast('Datos copiados desde ' + origen.temporada + ' ' + origen.anio,'success');
            } else {
                data.temporadaData[id] = { carreras:[], niveles:[], secciones:[], asignaturas:[], docentes:[], salas:[], asignaturaCarreraNivel:[], planificaciones:[] };
                toast('Nueva temporada vacía','info');
            }
            data.temporadas.push(nuevaTemp);
            actualizarSelectorTemporada(); document.getElementById('btnGestionarTemps').click();
        };
        document.getElementById('modalOverlay').onclick=(e)=>{if(e.target===e.currentTarget)cerrarModal();};
        document.querySelectorAll('.btn-eliminar-temp').forEach(b=>b.onclick=()=>{ if(confirm('Eliminar temporada? Se borrarán todos sus datos.')){ const idx=parseInt(b.dataset.idx); const idElim=data.temporadas[idx]?.id; if(idElim) delete data.temporadaData[idElim]; data.temporadas.splice(idx,1); if(data.sel.temporadaId===idElim) data.sel.temporadaId=data.temporadas[0]?.id; actualizarSelectorTemporada(); document.getElementById('btnGestionarTemps').click(); }});
        document.getElementById('btnGuardarTemps').onclick=()=>{
            data.temporadas.forEach((t,i)=>{ const sel2=document.getElementById(`tempSel_${i}`); const anio2=document.getElementById(`tempAnio_${i}`); if(sel2) t.temporada=sel2.value; if(anio2) t.anio=parseInt(anio2.value); });
            guardar(); actualizarSelectorTemporada(); cerrarModal(); reconstruirIndices(); refrescarTodo();
        };
    };

    cargar().then(()=>{
        actualizarSelectorTemporada(); aplicarPaleta(); actualizarIndicadorPaleta(); refrescarTodo();
        if(document.getElementById('fichaDocente')) actualizarFichaDocentes();
        // Sin autoguardado por intervalo — cada acción llama a guardar() directamente
        // Esto evita que un usuario pise los cambios del otro en entorno multiusuario
    });
})();
}; // fin window._iniciarApp
</script>
</body>
</html>
